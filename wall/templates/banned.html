{% extends 'base.html' %}
{% block content %}

<div class="max-w-lg mx-auto">
<div class="bg-white dark:bg-gray-900 border border-red-200 dark:border-red-800 rounded-2xl p-8 shadow-sm text-center">

<p class="text-5xl mb-4">🔨</p>
<h2 class="text-2xl font-bold text-red-600 dark:text-red-400 mb-2">You've been banned</h2>
<p class="text-gray-500 dark:text-gray-400 text-sm mb-4">Your account has been suspended from Whispr.</p>

{% if ban_reason %}
<div class="bg-red-50 dark:bg-red-950 border border-red-200 dark:border-red-800 rounded-xl p-4 mb-6">
<p class="text-sm font-semibold text-red-700 dark:text-red-300 mb-1">Reason:</p>
<p class="text-sm text-red-600 dark:text-red-400">{{ ban_reason }}</p>
</div>
{% endif %}

<p class="text-xs text-gray-400 dark:text-gray-500 mb-6">If you believe this is a mistake, contact the site administrator.</p>
<a href="/" class="inline-block bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 text-sm font-semibold px-5 py-2 rounded-xl transition">← View Wall (read only)</a>

</div>
</div>

{% endblock %}
