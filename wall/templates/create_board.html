{% extends 'base.html' %}
{% block content %}

<div class="max-w-lg mx-auto">
<div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl p-8 shadow-sm">

<div class="mb-6">
<h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100">Create a Board 🏘️</h2>
<p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Start your own whisper community</p>
</div>

<form method="post" class="space-y-5">
{% csrf_token %}

<div>
<label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Board Name</label>
<div class="flex items-center gap-2">
<span class="text-gray-400 font-semibold text-sm">b/</span>
<input type="text" name="name" placeholder="e.g. college, relationships, work" required maxlength="50" class="flex-1 px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-rose-500 transition">
</div>
<p class="text-xs text-gray-400 mt-1">No spaces or special characters</p>
{% if form.name.errors %}
<p class="text-red-500 text-xs mt-1">{{ form.name.errors|join:", " }}</p>
{% endif %}
</div>

<div>
<label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Description</label>
<textarea name="description" rows="3" placeholder="What is this board about?" class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-rose-500 transition resize-none"></textarea>
</div>

<button type="submit" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-semibold py-3 rounded-xl transition">Create Board 🏘️</button>
</form>

<p class="text-center text-sm text-gray-400 mt-4"><a href="/" class="hover:text-rose-600 transition">← Back to wall</a></p>
</div>
</div>

{% endblock %}
