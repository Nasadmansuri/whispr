{% extends 'base.html' %}
{% block content %}

<div class="max-w-lg mx-auto">
<div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl p-8 shadow-sm text-center">

{% if success %}
<p class="text-5xl mb-4">✅</p>
<h2 class="text-2xl font-bold text-green-600 dark:text-green-400 mb-2">Email Verified!</h2>
<p class="text-gray-500 dark:text-gray-400 text-sm mb-6">Your account is now fully verified. Welcome to Whispr!</p>
<a href="/" class="inline-block bg-rose-600 hover:bg-rose-700 text-white text-sm font-semibold px-5 py-2 rounded-xl transition">Go to Wall 🫧</a>
{% else %}
<p class="text-5xl mb-4">❌</p>
<h2 class="text-2xl font-bold text-red-600 dark:text-red-400 mb-2">Invalid Link</h2>
<p class="text-gray-500 dark:text-gray-400 text-sm mb-6">This verification link is invalid or has expired. Try registering again.</p>
<a href="/register/" class="inline-block bg-rose-600 hover:bg-rose-700 text-white text-sm font-semibold px-5 py-2 rounded-xl transition">Register Again</a>
{% endif %}

</div>
</div>

{% endblock %}
