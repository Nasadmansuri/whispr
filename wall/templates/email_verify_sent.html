{% extends 'base.html' %}
{% block content %}

<div class="max-w-lg mx-auto">
<div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl p-8 shadow-sm text-center">
<p class="text-5xl mb-4">📧</p>
<h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-2">Check your email!</h2>
<p class="text-gray-500 dark:text-gray-400 text-sm mb-4">We sent a verification link to <span class="font-semibold text-rose-600 dark:text-rose-400">{{ email }}</span></p>
<div class="bg-rose-50 dark:bg-rose-950 border border-rose-200 dark:border-rose-800 rounded-xl p-4 mb-6">
<p class="text-sm text-rose-700 dark:text-rose-300">Click the link in the email to verify your account. You can still browse the wall while unverified.</p>
</div>
<a href="/" class="inline-block bg-rose-600 hover:bg-rose-700 text-white text-sm font-semibold px-5 py-2 rounded-xl transition">← Go to Wall</a>
</div>
</div>

{% endblock %}
