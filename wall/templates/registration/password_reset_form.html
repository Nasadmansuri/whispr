{% extends 'base.html' %}
{% block content %}

<div class="max-w-lg mx-auto">
<div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl p-8 shadow-sm">
<div class="mb-6">
<h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100">Reset Password 🔑</h2>
<p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Enter your email and we'll send a reset link</p>
</div>
<form method="post" class="space-y-4">
{% csrf_token %}
<div>
<label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Email Address</label>
<input type="email" name="email" required placeholder="your@email.com" class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-rose-500 transition">
</div>
<button type="submit" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-semibold py-3 rounded-xl transition">Send Reset Link</button>
</form>
<p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6"><a href="/accounts/login/" class="text-rose-600 dark:text-rose-400 hover:underline">← Back to Login</a></p>
</div>
</div>

{% endblock %}
